<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>روشنی</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />

  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ── */
    :root {
      --bg:       #F7F6F1;
      --card:     #FFFFFF;
      --ink:      #0E4D40;
      --muted:    #6E7D77;
      --hairline: #E7E3D8;
      --gold:     #C98A2A;
      --radius:   14px;
      --gap:      24px;
      --font-u:   'Noto Nastaliq Urdu', Georgia, serif;
      --font-s:   'Inter', system-ui, -apple-system, sans-serif;
    }

    /* ── Base ── */
    body {
      font-family: var(--font-s);
      background: var(--bg);
      color: #1A1A1A;
      padding: 0 20px 88px;
      max-width: 460px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Logo lockup — not interactive ── */
    .logo-lockup {
      text-align: center;
      padding: 40px 0 32px;
      pointer-events: none;
      user-select: none;
      cursor: default;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      direction: ltr;
      margin-bottom: 8px;
    }

    .sun-mark {
      width: 42px; height: 42px;
      background: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .brand {
      font-family: var(--font-u);
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
    }

    .tagline {
      font-family: var(--font-u);
      font-size: 13px;
      line-height: 2.0;
      color: var(--muted);
      direction: rtl;
    }

    /* ── Input card ── */
    .input-card {
      background: var(--card);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 22px;
    }

    #msg {
      width: 100%;
      min-height: 140px;
      padding: 14px;
      font-family: var(--font-u);
      font-size: 18px;
      line-height: 2.1;
      border: 1px solid var(--hairline);
      border-radius: 10px;
      background: var(--bg);
      color: #1A1A1A;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: block;
    }

    #msg:focus {
      border-color: var(--ink);
      box-shadow: 0 0 0 2px rgba(14, 77, 64, 0.1);
    }

    .helper {
      font-family: var(--font-u);
      font-size: 12px;
      line-height: 2.0;
      color: var(--muted);
      text-align: right;
      direction: rtl;
      margin: 8px 0 14px;
    }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-u);
      font-size: 18px;
      line-height: 1.5;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .btn-primary:not(:disabled):hover { background: #0A3D32; }
    .btn-primary:disabled { background: #8AAAA4; cursor: not-allowed; }

    /* ── Collapsed message bar ── */
    #collapsed-bar {
      display: none;       /* flex when visible */
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.15s;
      direction: rtl;
    }

    #collapsed-bar:hover { border-color: var(--ink); }

    .collapsed-body {
      flex: 1;
      min-width: 0;
    }

    .collapsed-lbl {
      display: block;
      font-family: var(--font-u);
      font-size: 11px;
      line-height: 1.8;
      color: var(--muted);
      margin-bottom: 1px;
    }

    #collapsed-snippet {
      display: block;
      font-family: var(--font-u);
      font-size: 14px;
      line-height: 1.9;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .collapsed-edit {
      color: var(--muted);
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    /* ── Error ── */
    #error {
      margin-top: 14px;
      padding: 13px 16px;
      background: #FEE2E2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      color: #991B1B;
      font-size: 14px;
      display: none;
    }

    /* ── Result section ── */
    #result { margin-top: var(--gap); display: none; }

    /* ── Language toggle ── */
    #lang-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: var(--gap);
      direction: ltr;
    }

    .lang-btn {
      flex: 1;
      padding: 8px 4px;
      font-family: var(--font-s);
      font-size: 12px;
      font-weight: 500;
      border-radius: 999px;
      border: 1.5px solid var(--ink);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      line-height: 1.3;
      transition: background 0.12s, color 0.12s;
    }

    .lang-btn.active { background: var(--ink); color: #fff; }
    .lang-btn:not(.active):hover { background: rgba(14, 77, 64, 0.07); }

    /* ── Verdict banner ── */
    .verdict-banner {
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-bottom: var(--gap);
    }

    .verdict-banner.v-safe        { background: #E4F3EA; color: #1B7A52; }
    .verdict-banner.v-caution     { background: #FBEFD8; color: #9A6B12; }
    .verdict-banner.v-likely_scam { background: #C0392B; color: #FFFFFF; }

    .verdict-main {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #verdict-icon  { font-size: 2rem; flex-shrink: 0; }

    #verdict-label {
      font-family: var(--font-u);
      font-size: 24px;
      font-weight: 600;
      line-height: 2.0;
    }

    #verdict-reason {
      font-family: var(--font-u);
      font-size: 15px;
      line-height: 2.0;
      margin-top: 10px;
      padding-top: 10px;
      display: none;
    }

    .verdict-banner.v-safe #verdict-reason,
    .verdict-banner.v-caution #verdict-reason {
      border-top: 1px solid rgba(0, 0, 0, 0.12);
    }

    .verdict-banner.v-likely_scam #verdict-reason {
      border-top: 1px solid rgba(255, 255, 255, 0.25);
    }

    /* LTR verdict text */
    #result.dir-ltr #verdict-label,
    #result.dir-ltr #verdict-reason {
      font-family: var(--font-s);
      font-size: 16px;
      line-height: 1.5;
    }

    /* ── Listen button ── */
    #listen-btn {
      width: 100%;
      padding: 15px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-u);
      font-size: 19px;
      line-height: 1.6;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      margin-bottom: var(--gap);
      transition: background 0.15s;
    }

    #listen-btn:not(:disabled):hover { background: #0A3D32; }
    #listen-btn:disabled { background: #8AAAA4; cursor: not-allowed; }
    #listen-btn .ti { font-size: 1.1rem; }

    /* ── Fields card with hairline dividers ── */
    .fields-card {
      background: var(--card);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: var(--gap);
    }

    .field-row { padding: 20px 22px; }
    .field-row:not(:last-child) { border-bottom: 1px solid var(--hairline); }

    .field-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .field-chip {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(14, 77, 64, 0.09);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink);
      font-size: 19px;
      flex-shrink: 0;
    }

    .field-label {
      font-family: var(--font-s);
      font-size: 18px;
      font-weight: 500;
      color: #3E5048;
    }

    /* Urdu script labels need the Nastaliq font */
    #result.dir-rtl .field-label {
      font-family: var(--font-u);
      line-height: 2.0;
    }

    /* Urdu values */
    #result.dir-rtl .field-value,
    #result.dir-rtl .field-value li {
      font-family: var(--font-u);
      font-size: 22px;
      line-height: 2.2;
      color: #1A1A1A;
    }

    /* Roman / English values */
    #result.dir-ltr .field-value,
    #result.dir-ltr .field-value li {
      font-family: var(--font-s);
      font-size: 17px;
      line-height: 1.7;
      color: #1A1A1A;
    }

    /* Numbered list */
    #r-todo { list-style: decimal; }
    #result.dir-rtl #r-todo { padding-right: 22px; padding-left: 0; }
    #result.dir-ltr #r-todo { padding-left: 22px;  padding-right: 0; }

    /* ── Note bar (outside fields card, at bottom) ── */
    .note-bar {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    #result.dir-rtl .note-bar { direction: rtl; }
    #result.dir-ltr .note-bar { direction: ltr; }

    .note-icon {
      font-size: 0.85rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 3px;
    }

    #result.dir-rtl .note-icon { margin-top: 8px; } /* Nastaliq descenders need extra space */

    #r-note {
      font-size: 13px;
      color: var(--muted);
    }

    #result.dir-rtl #r-note  { font-family: var(--font-u); font-size: 14px; line-height: 2.0; }
    #result.dir-ltr #r-note  { font-family: var(--font-s); line-height: 1.55; }

    /* ── Unrelated card ── */
    #unrelated-card {
      display: none;
      background: var(--card);
      border: 1px solid var(--hairline);
      border-radius: var(--radius);
      padding: 28px 24px;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: var(--gap);
    }

    .unrelated-icon {
      font-size: 1.7rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 4px;
    }

    #result.dir-rtl .unrelated-text {
      font-family: var(--font-u);
      font-size: 20px;
      line-height: 2.3;
      color: var(--muted);
    }

    #result.dir-ltr .unrelated-text {
      font-family: var(--font-s);
      font-size: 16px;
      line-height: 1.7;
      color: var(--muted);
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Logo — not interactive -->
  <header class="logo-lockup">
    <div class="logo-row">
      <div class="sun-mark"><i class="ti ti-sun"></i></div>
      <span class="brand">روشنی</span>
    </div>
    <p class="tagline">اپنا پیغام آسان زبان میں سمجھیں</p>
  </header>

  <main>

    <!-- Full input (collapses after a result) -->
    <section id="input-section">
      <div class="input-card">
        <textarea id="msg" dir="auto" placeholder="یہاں اپنا پیغام لکھیں یا پیسٹ کریں"></textarea>
        <p class="helper">اردو، رومن اردو یا انگریزی، کوئی بھی چلے گا</p>
        <button id="explain-btn" class="btn-primary" onclick="explain()">سمجھائیں</button>
      </div>
    </section>

    <!-- Compact collapsed bar — tap to re-expand -->
    <div id="collapsed-bar" onclick="expandInput()">
      <div class="collapsed-body">
        <span class="collapsed-lbl">آپ کا پیغام</span>
        <span id="collapsed-snippet"></span>
      </div>
      <i class="ti ti-pencil collapsed-edit"></i>
    </div>

    <div id="error"></div>

    <!-- Result -->
    <div id="result" class="dir-rtl">

      <!-- Language toggle -->
      <div id="lang-toggle">
        <button class="lang-btn active" onclick="setLang('urdu', this)">اردو</button>
        <button class="lang-btn" onclick="setLang('roman_urdu', this)">Roman Urdu</button>
        <button class="lang-btn" onclick="setLang('english', this)">English</button>
      </div>

      <!-- Unrelated message card (only for message_type="unrelated") -->
      <div id="unrelated-card">
        <i class="ti ti-message-question unrelated-icon"></i>
        <p class="unrelated-text"></p>
      </div>

      <!-- Verdict banner (hero) -->
      <div id="verdict-banner" class="verdict-banner v-safe">
        <div class="verdict-main">
          <i id="verdict-icon" class="ti ti-shield-check"></i>
          <span id="verdict-label"></span>
        </div>
        <p id="verdict-reason"></p>
      </div>

      <!-- Listen -->
      <button id="listen-btn" onclick="speak()">
        <i class="ti ti-player-play"></i>
        <span id="listen-label">سن کر سمجھیں</span>
      </button>
      <p id="speak-error" style="display:none;font-size:14px;color:#C0392B;margin:4px 0 0;text-align:center"></p>

      <!-- Fields card -->
      <div class="fields-card">

        <div class="field-row">
          <div class="field-header">
            <span class="field-chip"><i class="ti ti-info-circle"></i></span>
            <span class="field-label" id="h-summary"></span>
          </div>
          <p id="r-summary" class="field-value"></p>
        </div>

        <div class="field-row">
          <div class="field-header">
            <span class="field-chip"><i class="ti ti-user"></i></span>
            <span class="field-label" id="h-applies"></span>
          </div>
          <p id="r-applies" class="field-value"></p>
        </div>

        <div class="field-row">
          <div class="field-header">
            <span class="field-chip"><i class="ti ti-list-check"></i></span>
            <span class="field-label" id="h-todo"></span>
          </div>
          <ol id="r-todo" class="field-value"></ol>
        </div>

        <div class="field-row">
          <div class="field-header">
            <span class="field-chip"><i class="ti ti-calendar"></i></span>
            <span class="field-label" id="h-deadline"></span>
          </div>
          <p id="r-deadline" class="field-value"></p>
        </div>

        <div class="field-row">
          <div class="field-header">
            <span class="field-chip"><i class="ti ti-building-bank"></i></span>
            <span class="field-label" id="h-source"></span>
          </div>
          <p id="r-source" class="field-value"></p>
        </div>

      </div><!-- .fields-card -->

      <!-- Note — muted, outside the card -->
      <div class="note-bar">
        <i class="ti ti-info-circle note-icon"></i>
        <p id="r-note"></p>
      </div>

    </div><!-- #result -->

  </main>

  <script>
    const LABELS = {
      urdu: {
        dir:            'rtl',
        summary:        'خلاصہ',
        applies_to_you: 'کیا یہ آپ سے متعلق ہے؟',
        what_to_do:     'کیا کریں؟',
        deadline:       'آخری تاریخ',
        official_source:'تصدیق کہاں کریں',
        listenLabel:    'سن کر سمجھیں',
        safetyLabel: {
          safe:        'یہ پیغام محفوظ ہے',
          caution:     'احتیاط کریں',
          likely_scam: 'یہ دھوکہ ہو سکتا ہے',
        },
      },
      roman_urdu: {
        dir:            'ltr',
        summary:        'Khulasa',
        applies_to_you: 'Kya yeh aap se mutaliq hai?',
        what_to_do:     'Kya karein?',
        deadline:       'Aakhri tareekh',
        official_source:'Tasdeeq kahan karein',
        listenLabel:    'Sun kar samjhein',
        safetyLabel: {
          safe:        'Yeh paigham mehfooz hai',
          caution:     'Ehtiyaat karein',
          likely_scam: 'Yeh dhoka ho sakta hai',
        },
      },
      english: {
        dir:            'ltr',
        summary:        'Summary',
        applies_to_you: 'Does this apply to you?',
        what_to_do:     'What to do',
        deadline:       'Deadline',
        official_source:'Where to verify',
        listenLabel:    'Listen',
        safetyLabel: {
          safe:        'This message is safe',
          caution:     'Proceed with caution',
          likely_scam: 'This is likely a scam',
        },
      },
    };

    const VERDICT_ICONS = {
      safe:        'ti-shield-check',
      caution:     'ti-alert-triangle',
      likely_scam: 'ti-alert-triangle',
    };

    let lastData        = null;
    let currentLang     = 'urdu';
    let audioPlayer     = null;
    let audioBlobCache  = {};   // lang → { promise: Promise, blob: Blob|null }

    /* ── Language toggle ── */
    function setLang(lang, btn) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (lastData) {
        renderLang(lastData, lang);
        prefetchAudio(lang);
      }
    }

    /* ── Re-expand collapsed input ── */
    function expandInput() {
      document.getElementById('input-section').style.display = 'block';
      document.getElementById('collapsed-bar').style.display = 'none';
      document.getElementById('msg').focus();
    }

    /* ── Submit ── */
    async function explain() {
      const msg      = document.getElementById('msg').value.trim();
      const btn      = document.getElementById('explain-btn');
      const errEl    = document.getElementById('error');
      const resultEl = document.getElementById('result');

      errEl.style.display    = 'none';
      resultEl.style.display = 'none';

      if (!msg) {
        showError('براہ کرم پہلے متن درج کریں۔');
        return;
      }

      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span>';

      const explainCtrl = new AbortController();
      const explainTid  = setTimeout(() => explainCtrl.abort(), 25000);

      try {
        const res = await fetch('/explain', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ message: msg }),
          signal:  explainCtrl.signal,
        });

        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.detail || `خرابی: ${res.status}`);
        }

        lastData = await res.json();
        console.log('[explain] response:', JSON.stringify(lastData, null, 2));

        /* Collapse the input */
        document.getElementById('collapsed-snippet').textContent = msg;
        document.getElementById('input-section').style.display  = 'none';
        document.getElementById('collapsed-bar').style.display  = 'flex';

        /* Reset language toggle to Urdu */
        currentLang    = 'urdu';
        audioBlobCache = {};
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.lang-btn')[0].classList.add('active');
        renderLang(lastData, 'urdu');
        prefetchAudio('urdu');

      } catch (e) {
        const msg = e.name === 'AbortError'
          ? 'کچھ مسئلہ ہوا، دوبارہ کوشش کریں — Something went wrong, please try again.'
          : (e.message || 'کچھ غلط ہو گیا۔ دوبارہ کوشش کریں۔');
        showError(msg);
        document.getElementById('input-section').style.display = 'block';
        document.getElementById('collapsed-bar').style.display = 'none';
      } finally {
        clearTimeout(explainTid);
        btn.disabled    = false;
        btn.textContent = 'سمجھائیں';
      }
    }

    /* ── Render result for selected language ── */
    function renderLang(data, lang) {
      const L        = LABELS[lang];
      const resultEl = document.getElementById('result');
      const block    = data[lang];

      console.log('[renderLang] lang=' + lang, '| type:', data.message_type, '| block:', block);

      if (!block) {
        console.error('[renderLang] no block for "' + lang + '". keys:', Object.keys(data));
        return;
      }

      /* Direction always applies */
      resultEl.classList.toggle('dir-rtl', L.dir === 'rtl');
      resultEl.classList.toggle('dir-ltr', L.dir === 'ltr');
      resultEl.setAttribute('dir', L.dir);

      const isUnrelated = (data.message_type === 'unrelated');

      /* Toggle which layout is visible */
      document.getElementById('unrelated-card').style.display  = isUnrelated ? 'flex' : 'none';
      document.getElementById('verdict-banner').style.display  = isUnrelated ? 'none' : '';
      document.getElementById('speak-error').style.display     = 'none';
      document.querySelector('.fields-card').style.display     = isUnrelated ? 'none' : '';
      document.querySelector('.note-bar').style.display        = isUnrelated ? 'none' : '';

      if (isUnrelated) {
        document.getElementById('listen-label').textContent      = L.listenLabel;
        document.querySelector('.unrelated-text').textContent    = block.summary ?? '';
        resultEl.style.display = 'block';
        return;
      }

      /* ── Normal layout (official / scam / unclear) ── */
      const status = data.safety_status ?? 'safe';

      /* Labels */
      document.getElementById('listen-label').textContent = L.listenLabel;
      document.getElementById('h-summary').textContent    = L.summary;
      document.getElementById('h-applies').textContent    = L.applies_to_you;
      document.getElementById('h-todo').textContent       = L.what_to_do;
      document.getElementById('h-deadline').textContent   = L.deadline;
      document.getElementById('h-source').textContent     = L.official_source;

      /* Values */
      document.getElementById('r-summary').textContent   = block.summary         ?? '';
      document.getElementById('r-applies').textContent   = block.applies_to_you  ?? '';
      document.getElementById('r-deadline').textContent  = block.deadline         ?? '';
      document.getElementById('r-source').textContent    = block.official_source  ?? '';
      document.getElementById('r-note').textContent      = block.note             ?? '';

      /* Verdict banner */
      const verdictEl     = document.getElementById('verdict-banner');
      const verdictIcon   = document.getElementById('verdict-icon');
      const verdictLabel  = document.getElementById('verdict-label');
      const verdictReason = document.getElementById('verdict-reason');

      verdictEl.className       = `verdict-banner v-${status}`;
      verdictIcon.className     = `ti ${VERDICT_ICONS[status] ?? 'ti-shield-check'}`;
      verdictLabel.textContent  = L.safetyLabel[status] ?? status;
      verdictReason.textContent = block.safety_reason ?? '';
      verdictReason.style.display = (status !== 'safe' && block.safety_reason) ? 'block' : 'none';

      /* What to do — numbered list */
      const ol = document.getElementById('r-todo');
      ol.innerHTML = '';
      (Array.isArray(block.what_to_do) ? block.what_to_do : []).forEach(step => {
        const li = document.createElement('li');
        li.textContent = step;
        ol.appendChild(li);
      });

      resultEl.style.display = 'block';
    }

    /* ── TTS pre-fetch ── */
    function prefetchAudio(lang) {
      if (!lastData || audioBlobCache[lang]) return;
      const b    = lastData[lang];
      const text = b?.spoken_version || b?.summary || '';
      if (!text) return;

      const entry = { promise: null, blob: null };
      audioBlobCache[lang] = entry;

      const ctrl = new AbortController();
      setTimeout(() => ctrl.abort(), 25000);

      entry.promise = fetch('/speak', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ text, lang }),
        signal:  ctrl.signal,
      })
      .then(res => { if (!res.ok) throw new Error('TTS failed'); return res.blob(); })
      .then(blob => { entry.blob = blob; return blob; })
      .catch(err => {
        /* Fail silently — on click the button will fetch on demand instead */
        console.warn('[prefetch] failed, will retry on click:', lang, err.name);
        delete audioBlobCache[lang];
        return null;
      });
    }

    function _listenBtnReset() {
      const btn = document.getElementById('listen-btn');
      btn.disabled  = false;
      btn.innerHTML = `<i class="ti ti-player-play"></i><span id="listen-label">${LABELS[currentLang].listenLabel}</span>`;
    }

    function _listenBtnPlaying() {
      const btn = document.getElementById('listen-btn');
      btn.disabled  = false;
      btn.innerHTML = `<i class="ti ti-player-stop"></i><span id="listen-label">روک دیں</span>`;
    }

    function _showSpeakError(msg) {
      const el = document.getElementById('speak-error');
      el.textContent   = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    /* ── TTS via /speak ── */
    async function speak() {
      if (!lastData) return;
      document.getElementById('speak-error').style.display = 'none';

      /* If already playing, this click means "stop" */
      if (audioPlayer && !audioPlayer.paused) {
        const a = audioPlayer;
        audioPlayer = null;          // null first so the 'pause' event doesn't double-cleanup
        a.pause();
        if (a._blobUrl) URL.revokeObjectURL(a._blobUrl);
        _listenBtnReset();
        return;
      }

      /* Stop any stalled/paused leftover */
      if (audioPlayer) {
        const a = audioPlayer;
        audioPlayer = null;
        a.pause();
        if (a._blobUrl) URL.revokeObjectURL(a._blobUrl);
      }

      const btn   = document.getElementById('listen-btn');
      const entry = audioBlobCache[currentLang];

      /* ── Case 1: blob already ready — play synchronously within click gesture ── */
      if (entry?.blob) {
        _playBlob(entry.blob, btn);
        return;
      }

      /* ── Case 2: prefetch in flight or nothing cached yet ── */
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span>';

      let blob = null;
      try {
        if (entry?.promise) {
          blob = await entry.promise;
        } else {
          /* Fallback: fetch on demand */
          const _b   = lastData[currentLang];
          const text = _b?.spoken_version || _b?.summary || '';
          if (!text) { _listenBtnReset(); return; }
          const speakCtrl = new AbortController();
          const speakTid  = setTimeout(() => speakCtrl.abort(), 25000);
          try {
            const res = await fetch('/speak', {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify({ text, lang: currentLang }),
              signal:  speakCtrl.signal,
            });
            if (!res.ok) throw new Error('TTS failed');
            blob = await res.blob();
          } finally {
            clearTimeout(speakTid);
          }
        }
      } catch (e) {
        console.error('[speak]', e);
        _showSpeakError('آواز ابھی دستیاب نہیں');
        _listenBtnReset();
        return;
      }

      if (!blob) {
        _showSpeakError('آواز ابھی دستیاب نہیں');
        _listenBtnReset();
        return;
      }

      _playBlob(blob, btn);
    }

    function _playBlob(blob, btn) {
      const blobUrl = URL.createObjectURL(blob);
      const audio   = new Audio(blobUrl);
      audio._blobUrl = blobUrl;
      audioPlayer    = audio;

      /* Spinner until audio is actually audible */
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span>';

      function _cleanup(showErr) {
        URL.revokeObjectURL(blobUrl);
        if (audioPlayer === audio) audioPlayer = null;
        if (showErr) _showSpeakError('آواز ابھی دستیاب نہیں');
        _listenBtnReset();
      }

      /* Real audio events drive button state */
      audio.addEventListener('playing', () => { _listenBtnPlaying(); });

      /* 'pause' covers browser-initiated pauses (tab switch, interruption).
         Our own stop code nulls audioPlayer before calling pause(),
         so the guard below prevents double-cleanup in that case. */
      audio.addEventListener('pause',  () => { if (audioPlayer === audio) _cleanup(false); else _listenBtnReset(); });
      audio.addEventListener('ended',  () => { _cleanup(false); });
      audio.addEventListener('error',  () => { _cleanup(true);  });

      audio.play().catch(e => {
        console.error('[audio.play]', e);
        _cleanup(true);
      });
    }

    /* ── Error display ── */
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent   = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
